<!DOCTYPE html>
<html lang="id">
<head>

  <title>Offline - Website Sekolah</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

  </div>

</html>
